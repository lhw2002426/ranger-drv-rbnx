manifestVersion: 1

build:
  script: rbnx/build.sh

package:
  id: com.vendor.ranger_drv
  name: ranger_drv_rbnx
  version: 0.0.1
  vendor: vendor
  description: Ranger driver package for ROS2 launch only
  license: Apache-2.0

nodes:
  - id: com.vendor.ranger_driver
    type: binary
    start: >
      source /opt/ros/humble/setup.bash &&
      source install/setup.sh &&
      exec bash rbnx/start.sh
